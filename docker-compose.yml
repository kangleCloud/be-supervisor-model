services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: be-supervisor-model
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      APP_ENV: prod
      APP_CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - /etc/ansible:/etc/ansible:ro
    ports:
      - "18881:18881"
    command: >-
      bash -lc "python3.12 -m aerich upgrade &&
      python3.12 -m uvicorn app.main:app --host 0.0.0.0 --port 18881"
