app:
  host: 0.0.0.0
  port: 18880
  logLevel: info

database:
  host: 127.0.0.1
  port: 3306
  name: supervisor_model
  user: root
  password: ""
  connectTimeoutSeconds: 5

auth:
  jwtSecret: please-change-me-to-a-32-char-secret
  accessTokenExpireMinutes: 480

supervisor:
  confDir: /etc/supervisord.d
  commandTimeoutSeconds: 30

executor:
  type: local
  inventoryPath: /etc/ansible/deploy_host
  remoteUser: root
  timeoutSeconds: 30

hosts:
  - name: local
    ip: 127.0.0.1
    enabled: true
    executorType: local
  - name: web-99
    ip: 10.1.0.99
    enabled: true
    executorType: ansible
    ansiblePattern: web-99
  - name: web-104
    ip: 10.1.0.104
    enabled: true
    executorType: ansible
    ansiblePattern: web-104
  - name: web-252
    ip: 101.1.0.252
    enabled: true
    executorType: ansible
    ansiblePattern: web-252
